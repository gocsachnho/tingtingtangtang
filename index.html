<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ting Ting Tang Tang - Thế Giới Truyện Chữ</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-dark: #111827;
            --bg-card: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        /* NAVBAR COMPONENT */
        .navbar {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .navbar-brand span {
            color: var(--primary-color);
        }

        /* CONTAINER */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #fff;
            border-left: 4px solid var(--primary-color);
            padding-left: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* STORIES GRID COMPONENT */
        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .story-card {
            background-color: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .story-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: var(--primary-color);
        }

        .story-cover-wrapper {
            position: relative;
            padding-top: 135%; /* Tỉ lệ ảnh bìa truyện chữ chuẩn */
            background-color: #111827;
            overflow: hidden;
        }

        .story-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .story-card:hover .story-cover {
            transform: scale(1.05);
        }

        .story-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .story-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 44px;
        }

        .story-meta {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .story-genre {
            background-color: rgba(79, 70, 229, 0.15);
            color: #a5b4fc;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        /* LOADING & EMPTY STATE */
        .loading-placeholder {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5px 0;
            color: var(--text-muted);
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR COMPONENT -->
    <nav class="navbar">
        <a href="./index.html" class="navbar-brand">TING TING TANG TANG<span>.</span></a>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <div class="section-title">
            <span>📚 Truyện Chữ Mới Cập Nhật</span>
        </div>

        <!-- Khung chứa danh sách truyện sẽ được điền tự động bằng Javascript -->
        <div id="storiesContainer" class="stories-grid">
            <div class="loading-placeholder">🔄 Đang đồng bộ danh sách truyện chữ từ hệ thống đám mây...</div>
        </div>
    </div>

    <!-- SDK COMPAT LOADING (Đồng bộ cấu trúc với trang Admin) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="./app.js"></script>
</body>
</html>
