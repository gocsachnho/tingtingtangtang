<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ting Ting Tang Tang - Góc Đọc Truyện</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <a href="index.html" class="logo">Ting Ting Tang Tang</a>

  <nav class="menu">
    <a href="index.html">Trang chủ</a>
    <a href="#gioithieu">Giới thiệu</a>
    <a href="#theloai">Thể loại</a>
    <a href="https://youtube.com" target="_blank">Kênh Youtube</a>
    <a href="#lienhe">Liên hệ</a>
  </nav>

  <div class="search-wrap">
    <input id="searchInput" placeholder="Tìm truyện...">
  </div>
</header>

<section class="hero" id="gioithieu">
  <h1>Góc Đọc Truyện</h1>
  <p>Kho truyện chữ online cập nhật mỗi ngày.</p>
</section>

<div class="layout">
  <main>
    <section>
      <h2>Truyện Mới</h2>
      <div class="grid" id="newStories"></div>
    </section>

    <section>
      <h2>Truyện Đề Cử</h2>
      <div class="grid" id="hotStories"></div>
    </section>

    <section id="theloai">
      <h2>Truyện Linh Dị</h2>
      <div class="grid" id="horrorStories"></div>
    </section>

    <section>
      <h2>Truyện Ngôn Tình</h2>
      <div class="grid" id="romanceStories"></div>
    </section>
  </main>

  <aside>
    <h3>Chương mới cập nhật</h3>
    <ul id="latestChapters"></ul>
  </aside>
</div>

<footer id="lienhe">
  © Ting Ting Tang Tang
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
</body>
</html>
