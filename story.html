<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết truyện</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <style>
    .header {
      display: grid !important;
      grid-template-columns: 430px 1fr 260px !important;
      align-items: center !important;
      gap: 30px !important;
      padding: 18px 5% !important;
      background: #0d1a2a !important;
      border-bottom: 1px solid #263950 !important;
    }

    .logo {
      font-family: "Great Vibes", cursive !important;
      font-size: 36px !important;
      color: #ffd369 !important;
      white-space: nowrap !important;
      line-height: 1 !important;
    }

    .menu {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      gap: 34px !important;
      flex-wrap: nowrap !important;
    }

    .menu a {
      font-size: 20px !important;
      font-weight: 700 !important;
      color: #e6f0ff !important;
      white-space: nowrap !important;
    }

    .search-wrap {
      display: flex !important;
      justify-content: flex-end !important;
    }

    .search-wrap input {
      width: 220px !important;
      padding: 11px 15px !important;
      border-radius: 24px !important;
      border: 1px solid #40556f !important;
      background: #0b1625 !important;
      color: white !important;
    }
  </style>
</head>

<body>

<header class="header">
  <a href="index.html" class="logo">Ting Ting Tang Tang</a>

  <nav class="menu">
    <a href="index.html">Trang chủ</a>
    <a href="index.html#gioithieu">Giới thiệu</a>
    <a href="index.html#theloai">Thể loại</a>
    <a href="https://youtube.com" target="_blank">Kênh Youtube</a>
    <a href="index.html#lienhe">Liên hệ</a>
  </nav>

  <div class="search-wrap">
    <input placeholder="Tìm truyện...">
  </div>
</header>

<main class="detail">
  <div id="storyDetail"></div>

  <h2>Danh sách chương</h2>
  <div id="chapterList"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/story.js"></script>

</body>
</html>
