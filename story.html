<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết truyện</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <style>
    .header {
      display: grid !important;
      grid-template-columns: 430px 1fr 260px !important;
      align-items: center !important;
      gap: 30px !important;
      padding: 18px 5% !important;
      background: #0d1a2a !important;
      border-bottom: 1px solid #263950 !important;
    }

    .logo {
      font-family: "Great Vibes", cursive !important;
      font-size: 36px !important;
      color: #ffd369 !important;
      white-space: nowrap !important;
      line-height: 1 !important;
      text-decoration: none !important;
    }

    .menu {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      gap: 34px !important;
      flex-wrap: nowrap !important;
    }

    .menu a {
      font-size: 20px !important;
      font-weight: 700 !important;
      color: #e6f0ff !important;
      white-space: nowrap !important;
      text-decoration: none !important;
    }

    .search-wrap {
      display: flex !important;
      justify-content: flex-end !important;
    }

    .search-wrap input {
      width: 220px !important;
      padding: 11px 15px !important;
      border-radius: 24px !important;
      border: 1px solid #40556f !important;
      background: #0b1625 !important;
      color: white !important;
    }

    .story-box {
      max-width: 1220px !important;
      margin: 35px auto 28px !important;
      padding: 28px !important;
    }

    .story-header-layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 42px;
      align-items: start;
    }

    .story-left img {
      width: 100%;
      max-width: 350px;
      border-radius: 16px;
      display: block;
      margin-bottom: 24px;
    }

    .story-left h1 {
      font-size: 38px;
      line-height: 1.25;
      margin: 0 0 18px;
      color: #fff;
    }

    .story-left .meta {
      font-size: 17px;
      line-height: 1.7;
    }

    .story-right {
      padding-top: 4px;
    }

    .story-description {
      font-size: 19px;
      line-height: 1.9;
      color: #f4f7ff;
    }

    .story-description p {
      margin: 0 0 20px;
    }

    .read-first-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 11px 18px;
      border-radius: 999px;
      background: #ffd369;
      color: #111 !important;
      font-weight: 700;
      text-decoration: none;
    }

    .pagination {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 30px 0 45px;
    }

    .pagination button {
      background: #132844;
      color: #fff;
      border: 1px solid #2b476b;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .pagination button:hover {
      border-color: #ffd369;
      color: #ffd369;
    }

    .pagination button.active {
      background: #ffd369;
      color: #111;
      border-color: #ffd369;
    }

    .pagination span {
      color: #9fb3c8;
      padding: 10px 4px;
    }

    @media (max-width: 950px) {
      .header {
        grid-template-columns: 1fr !important;
        gap: 16px !important;
      }

      .menu {
        justify-content: flex-start !important;
        flex-wrap: wrap !important;
      }

      .search-wrap {
        justify-content: flex-start !important;
      }

      .search-wrap input {
        width: 100% !important;
      }

      .story-header-layout {
        grid-template-columns: 1fr;
      }

      .story-left img {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

<header class="header">
  <a href="index.html" class="logo">Ting Ting Tang Tang</a>

  <nav class="menu">
    <a href="index.html">Trang chủ</a>
    <a href="index.html#gioithieu">Giới thiệu</a>
    <a href="index.html#theloai">Thể loại</a>
    <a href="https://youtube.com" target="_blank">Kênh Youtube</a>
    <a href="index.html#lienhe">Liên hệ</a>
  </nav>

  <div class="search-wrap">
    <input placeholder="Tìm truyện...">
  </div>
</header>

<main class="detail">
  <div id="storyDetail"></div>

  <h2>Danh sách chương</h2>
  <div id="chapterList"></div>
  <div id="pagination"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/story.js"></script>

</body>
</html>
