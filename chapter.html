<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đọc chương - Ting Ting Tang Tang</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Serif:wght@400;500;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #08111c;
      color: #e9eef7;
      font-family: "Inter", Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .header {
      display: grid;
      grid-template-columns: 360px 1fr;
      align-items: center;
      gap: 20px;
      padding: 16px 5%;
      background: #0d1a2a;
      border-bottom: 1px solid #263950;
    }

    .logo {
      font-family: "Great Vibes", cursive;
      font-size: 34px;
      color: #ffd369;
      white-space: nowrap;
      line-height: 1;
    }

    .menu {
      display: flex;
      justify-content: flex-end;
      gap: 28px;
      font-size: 18px;
      font-weight: 800;
    }

    .reader {
      max-width: 930px;
      margin: 34px auto;
      padding: 0 18px;
    }

    .chapter-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0;
    }

    .chapter-nav a {
      background: #ffd369;
      color: #111;
      padding: 11px 20px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 15px;
    }

    .chapter-nav a.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .chapter-box {
      background: #111f31;
      border: 1px solid #263950;
      border-radius: 18px;
      padding: 38px 46px;
    }

    h1 {
      text-align: center;
      color: #ffd369;
      font-size: 34px;
      line-height: 1.35;
      margin: 0 0 16px;
    }

    .story-title {
      text-align: center;
      color: #9fb3ff;
      margin-bottom: 36px;
      font-weight: 800;
      font-size: 17px;
    }

    .chapter-content {
      font-family: "Noto Serif", Georgia, serif;
      font-size: 20px;
      line-height: 2;
      color: #f1f4fa;
    }

    .chapter-content p {
      margin: 0 0 22px;
    }

    @media (max-width: 760px) {
      .header {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 10px 14px;
      }

      .logo {
        font-size: 29px;
        text-align: center;
      }

      .menu {
        justify-content: center;
        gap: 22px;
        font-size: 14px;
      }

      .reader {
        margin: 18px auto;
        padding: 0 12px;
      }

      .chapter-box {
        padding: 24px 18px;
        border-radius: 14px;
      }

      h1 {
        font-size: 25px;
        line-height: 1.35;
      }

      .story-title {
        font-size: 15px;
        margin-bottom: 28px;
      }

      .chapter-content {
        font-size: 18px;
        line-height: 1.85;
      }

      .chapter-content p {
        margin-bottom: 18px;
      }

      .chapter-nav a {
        font-size: 13px;
        padding: 9px 13px;
      }
    }
  </style>
</head>

<body>

<header class="header">
  <a href="./index.html" class="logo">Ting Ting Tang Tang</a>
  <nav class="menu">
    <a href="./index.html">Trang chủ</a>
    <a id="backStory" href="#">Chi tiết truyện</a>
  </nav>
</header>

<main class="reader">
  <div class="chapter-nav">
    <a id="prevTop" href="#">← Chương trước</a>
    <a id="nextTop" href="#">Chương sau →</a>
  </div>

  <section class="chapter-box">
    <h1 id="chapterTitle">Đang tải chương...</h1>
    <div class="story-title" id="storyName"></div>
    <article class="chapter-content" id="chapterContent"></article>
  </section>

  <div class="chapter-nav">
    <a id="prevBottom" href="#">← Chương trước</a>
    <a id="nextBottom" href="#">Chương sau →</a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/chapter.js"></script>
</body>
</html>
