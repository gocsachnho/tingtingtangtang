<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đọc chương - Ting Ting Tang Tang</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@600;700;800&family=Nunito:wght@400;600;700;800&family=Noto+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      margin: 0;
      background: #f9f2f8 !important;
      color: #4f4150 !important;
      font-family: "Nunito", Arial, sans-serif;
      font-weight: 600;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .header {
      display: grid;
      grid-template-columns: 360px 1fr;
      align-items: center;
      gap: 20px;
      padding: 16px 5%;
      background: #fff7fc !important;
      border-bottom: 1px solid #ead5e4 !important;
      box-shadow: 0 6px 22px rgba(185,111,163,.08);
    }

    .logo {
      font-family: "Great Vibes", cursive;
      font-size: 34px;
      color: #c77fb1 !important;
      white-space: nowrap;
      line-height: 1;
    }

    .menu {
      display: flex;
      justify-content: flex-end;
      gap: 28px;
      font-size: 18px;
      font-weight: 800;
      color: #6b5268;
    }

    .menu a {
      color: #6b5268 !important;
    }

    .reader {
      max-width: 960px;
      margin: 34px auto;
      padding: 0 18px;
      background: transparent !important;
    }

    .chapter-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0;
    }

    .chapter-nav a {
      background: #d88ac0 !important;
      color: #fff !important;
      padding: 11px 20px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 15px;
      box-shadow: 0 8px 22px rgba(216,138,192,.22);
    }

    .chapter-nav a.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .chapter-box {
      background: #ffffff !important;
      border: 1px solid #ead5e4 !important;
      border-radius: 18px;
      padding: 38px 46px;
      box-shadow: 0 10px 28px rgba(185,111,163,.12);
    }

    h1 {
      font-family: "Playfair Display", serif;
      text-align: center;
      color: #b96fa3 !important;
      font-size: 34px;
      line-height: 1.35;
      margin: 0 0 16px;
      font-weight: 800;
    }

    .story-title {
      text-align: center;
      color: #8e6b91 !important;
      margin-bottom: 36px;
      font-weight: 800;
      font-size: 17px;
    }

  .chapter-content {
  font-family: "Noto Serif", Georgia, serif;
  font-size: 22px;
  line-height: 2.15;

  color: #3b2f3f !important;
  font-weight: 600;

  text-align: justify;
  text-justify: inter-word;

  word-break: normal !important;
  overflow-wrap: normal !important;
  white-space: normal !important;

  text-indent: 2em;
}

    .chapter-content p {
  margin: 0 0 24px;
  color: #2f2433 !important;
  font-weight: 600;

  text-align: justify;
  text-justify: inter-word;
}
    .chapter-content p:first-child {
  text-indent: 0;
}

    @media (max-width: 760px) {
      .header {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 10px 14px;
      }

      .logo {
        font-size: 29px;
        text-align: center;
      }

      .menu {
        justify-content: center;
        gap: 22px;
        font-size: 14px;
      }

      .reader {
        margin: 18px auto;
        padding: 0 12px;
      }

      .chapter-box {
        padding: 24px 18px;
        border-radius: 14px;
      }

      h1 {
        font-size: 25px;
        line-height: 1.35;
      }

      .story-title {
        font-size: 15px;
        margin-bottom: 28px;
      }

      .chapter-content {
        font-size: 18px;
        line-height: 1.9;
      }

      .chapter-content p {
        margin-bottom: 18px;
      }

      .chapter-nav a {
        font-size: 13px;
        padding: 9px 13px;
      }
    }
  </style>
</head>

<body>

<header class="header">
  <a href="./index.html" class="logo">Ting Ting Tang Tang</a>
  <nav class="menu">
    <a href="./index.html">Trang chủ</a>
    <a id="backStory" href="#">Chi tiết truyện</a>
  </nav>
</header>

<main class="reader">
  <div class="chapter-nav">
    <a id="prevTop" href="#">← Chương trước</a>
    <a id="nextTop" href="#">Chương sau →</a>
  </div>

  <section class="chapter-box">
    <h1 id="chapterTitle">Đang tải chương...</h1>
    <div class="story-title" id="storyName"></div>
    <article class="chapter-content" id="chapterContent"></article>
  </section>

  <div class="chapter-nav">
    <a id="prevBottom" href="#">← Chương trước</a>
    <a id="nextBottom" href="#">Chương sau →</a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/chapter.js"></script>
</body>
</html>
